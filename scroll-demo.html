<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaf Go — Scroll Demo</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', 'Arial', sans-serif; background: #0a0a08; color: #fff; }

  /* ── SPACER above video section ── */
  .spacer { height: 50vh; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); font-size: 0.8rem; letter-spacing: 0.2em; }

  /* ════════════ VIDEO SCRUB SECTION ════════════ */
  .scrub-section {
    position: relative;
    height: 400vh; /* 4x viewport for scroll room */
    overflow: visible;
  }
  .scrub-pin {
    position: sticky; top: 0;
    height: 100vh;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .scrub-video-wrap {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .scrub-video-wrap video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.45) saturate(0.6);
  }
  .scrub-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(10,10,8,0.8) 100%);
    pointer-events: none; z-index: 1;
  }

  /* ── Leaf overlay ── */
  .leaf-overlay {
    position: absolute; z-index: 2;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    inset: 0;
  }
  .leaf-svg {
    width: min(60vw, 400px);
    filter: drop-shadow(0 0 60px rgba(90,125,58,0.5));
    will-change: transform, opacity;
    opacity: 0;
    transform: scale(0.3) rotate(-15deg) translateY(60px);
  }

  /* ── Content overlay (text fades in near end) ── */
  .scrub-content {
    position: absolute; z-index: 3; bottom: 15%;
    text-align: center; width: 100%; padding: 0 2rem;
  }
  .scrub-content .label {
    font-size: clamp(0.6rem, 1.6vw, 0.75rem);
    letter-spacing: 7px; text-transform: uppercase;
    color: rgba(90,125,58,0.5); margin-bottom: 20px;
    opacity: 0; transform: translateY(20px);
    will-change: transform, opacity;
  }
  .scrub-content .title {
    font-size: clamp(1.5rem, 4.5vw, 2.8rem);
    color: #fff; line-height: 1.3; font-weight: 200;
    opacity: 0; transform: translateY(30px);
    will-change: transform, opacity;
  }
  .scrub-content .accent {
    display: inline-block; width: 40px; height: 1px;
    background: #5a7d3a; margin: 20px 0;
    opacity: 0;
    will-change: opacity;
  }

  /* ── Transition zone (logo flies to header position) ── */
  .transition-zone {
    height: 150vh;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .hero-logo-final {
    width: min(60vw, 400px);
    filter: brightness(0) invert(1) drop-shadow(0 0 80px rgba(90,125,58,0.3));
    opacity: 0;
    transform: scale(2.5);
    will-change: transform, opacity;
  }

  /* ── Spacer below ── */
  .below { height: 100vh; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); font-size: 0.8rem; }

  @media (max-width: 768px) {
    .scrub-content { bottom: 20%; }
    .leaf-svg { width: 70vw; }
  }
</style>
</head>
<body>

<div class="spacer">↓ SCROLL FOR CINEMATIC INTRO ↓</div>

<!-- ════════════ VIDEO SCRUB SECTION ════════════ -->
<div class="scrub-section" id="scrubSection">
  <div class="scrub-pin">
    <div class="scrub-video-wrap">
      <video id="scrubVideo" muted playsinline preload="auto"
             src="leafgo-hero-scrub.mp4"></video>
    </div>
    <div class="scrub-vignette"></div>

    <!-- Leaf → Logo SVG overlay -->
    <div class="leaf-overlay" id="leafOverlay">
      <svg class="leaf-svg" id="leafSVG" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Leaf shape matching Leaf Go logo -->
        <defs>
          <radialGradient id="leafGrad" cx="40%" cy="30%">
            <stop offset="0%" stop-color="#7aad4a"/>
            <stop offset="100%" stop-color="#4a6b2e"/>
          </radialGradient>
        </defs>
        <!-- Leaf body -->
        <path d="M100 30 C60 30 25 70 20 110 C15 145 35 170 60 180 C80 188 95 175 100 160 C105 175 120 188 140 180 C165 170 185 145 180 110 C175 70 140 30 100 30Z"
              fill="url(#leafGrad)" opacity="0.9"/>
        <!-- Center vein -->
        <line x1="100" y1="35" x2="100" y2="165" stroke="#2d4a12" stroke-width="1.5" opacity="0.6"/>
        <!-- Side veins -->
        <path d="M100 60 Q80 55 60 65" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M100 60 Q120 55 140 65" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M100 90 Q70 80 45 95" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M100 90 Q130 80 155 95" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M100 120 Q75 112 55 130" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.3"/>
        <path d="M100 120 Q125 112 145 130" stroke="#2d4a12" stroke-width="1" fill="none" opacity="0.3"/>
        <!-- Stem -->
        <line x1="100" y1="170" x2="100" y2="195" stroke="#5a7d3a" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
        <!-- Subtle glow circle behind leaf (foreshadows logo O) -->
        <circle cx="100" cy="105" r="85" fill="none" stroke="#5a7d3a" stroke-width="1.5" opacity="0.15"
                stroke-dasharray="8 4"/>
      </svg>
    </div>

    <!-- Text content that fades in -->
    <div class="scrub-content" id="scrubContent">
      <div class="label" id="scrubLabel">Die Mission</div>
      <div class="title" id="scrubTitle">In 30 Metern Höhe<br>beginnt unsere Arbeit.</div>
      <div class="accent" id="scrubAccent"></div>
    </div>
  </div>
</div>

<!-- Transition zone: logo flies to final position -->
<div class="transition-zone" id="transitionZone">
  <img src="leafgo_logo_sharp.png" class="hero-logo-final" id="heroLogoFinal"
       alt="Leaf Go"
       style="filter: brightness(0) invert(1) drop-shadow(0 0 80px rgba(90,125,58,0.3));">
</div>

<div class="below">↓ CONTINUE ↓</div>

<script>
(function() {
  const video = document.getElementById('scrubVideo');
  const section = document.getElementById('scrubSection');
  const leafSVG = document.getElementById('leafSVG');
  const leafOverlay = document.getElementById('leafOverlay');
  const scrubLabel = document.getElementById('scrubLabel');
  const scrubTitle = document.getElementById('scrubTitle');
  const scrubAccent = document.getElementById('scrubAccent');
  const heroLogoFinal = document.getElementById('heroLogoFinal');
  const transitionZone = document.getElementById('transitionZone');

  let videoReady = false;

  video.addEventListener('loadedmetadata', () => {
    videoReady = true;
    video.pause();
    video.currentTime = 0;
  });
  if (video.readyState >= 2) videoReady = true;
  video.load();

  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

  // Smooth interpolation
  function lerp(a, b, t) { return a + (b - a) * t; }

  function update() {
    if (!videoReady) { requestAnimationFrame(update); return; }

    const rect = section.getBoundingClientRect();
    const wh = window.innerHeight;
    
    // Progress: 0 when section top enters viewport bottom, 1 when section bottom leaves viewport top
    const progress = clamp((wh - rect.top) / (wh + rect.height), 0, 1);
    
    // ── Phase 1: First 70% of scroll → video scrubbing + leaf emerges ──
    const phase1 = clamp(progress / 0.7, 0, 1);
    video.currentTime = phase1 * video.duration;
    
    // Leaf animation: appears in middle of video scrub (0.3→0.7 of phase1)
    const leafProgress = clamp((phase1 - 0.25) / 0.55, 0, 1);
    const leafScale = lerp(0.25, 1.15, leafProgress);
    const leafOpacity = clamp(leafProgress * 2, 0, 1) * clamp((1 - leafProgress) * 3, 0, 1);
    const leafRotate = lerp(-20, 0, leafProgress);
    const leafY = lerp(80, -10, leafProgress);
    
    leafSVG.style.opacity = leafOpacity;
    leafSVG.style.transform = `scale(${leafScale}) rotate(${leafRotate}deg) translateY(${leafY}px)`;
    
    // Text fades in near end of phase1
    const textProgress = clamp((phase1 - 0.55) / 0.45, 0, 1);
    scrubLabel.style.opacity = textProgress;
    scrubLabel.style.transform = `translateY(${lerp(20, 0, textProgress)}px)`;
    scrubTitle.style.opacity = textProgress;
    scrubTitle.style.transform = `translateY(${lerp(30, 0, textProgress)}px)`;
    scrubAccent.style.opacity = textProgress;
    
    // ── Phase 2: Last 30% of scroll → leaf "flies" to logo position ──
    const phase2 = clamp((progress - 0.7) / 0.3, 0, 1);
    
    // Leaf transitions out as logo scales in
    const leafFadeOut = 1 - clamp(phase2 * 2, 0, 1);
    leafSVG.style.opacity = leafOpacity * leafFadeOut;
    
    // Video dims slightly
    const videoDim = 1 - phase2 * 0.3;
    video.style.filter = `brightness(${0.45 * videoDim}) saturate(${0.6 * videoDim})`;
    
    // ── Transition zone: Logo scales from large to normal ──
    const tzRect = transitionZone.getBoundingClientRect();
    const tzProgress = clamp((wh - tzRect.top) / (wh + tzRect.height), 0, 1);
    
    const logoTargetScale = lerp(2.5, 1.0, clamp(tzProgress * 1.3, 0, 1));
    const logoTargetOpacity = clamp(tzProgress * 1.5, 0, 1);
    heroLogoFinal.style.opacity = logoTargetOpacity;
    heroLogoFinal.style.transform = `scale(${logoTargetScale})`;
    
    requestAnimationFrame(update);
  }

  video.addEventListener('loadedmetadata', () => {
    requestAnimationFrame(update);
  });

  // Kick-off
  requestAnimationFrame(update);
})();
</script>

</body>
</html>
